services:
  backend:
    build:
      context: ./backend
      target: prod
    ports:
      - "8000:8000"
    volumes:
      - selfynk_data:/app/data
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/selfynk.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  selfynk_data:
